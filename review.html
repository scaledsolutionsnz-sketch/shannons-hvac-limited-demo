<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Review | Shannons HVAC Limited</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%2316181b'/%3E%3Ctext x='50' y='68' font-family='Arial Black,Arial' font-size='52' font-weight='900' fill='%23FF5A1F' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700;800&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Public Sans',sans-serif;background:#16181b;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#1e2125;border:1px solid rgba(255,255,255,.09);border-radius:14px;max-width:460px;width:100%;padding:46px 38px;text-align:center}
.brand{font-family:'Saira Condensed';font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:1.4rem;margin-bottom:6px}
.brand small{color:#FF5A1F}
h1{font-family:'Saira Condensed';text-transform:uppercase;font-weight:700;font-size:2rem;margin:18px 0 6px;line-height:1.05}
.sub{color:#aeb3b8;font-size:.98rem;margin-bottom:8px}
.stars{font-size:2.8rem;margin:24px 0 10px;user-select:none}
.star{cursor:pointer;color:#3a3f45;transition:color .15s,transform .15s;padding:0 3px}
.star:hover,.star.active{color:#FF5A1F}
.star:hover{transform:translateY(-2px)}
#msg{min-height:24px;color:#e4e6e9;margin:6px 0 18px;font-weight:500}
a.cta{display:none;background:#FF5A1F;color:#fff;text-decoration:none;font-weight:700;padding:.9rem 1.8rem;border-radius:6px;margin-top:6px}
a.cta:hover{background:#E8410B}
.back{display:inline-block;margin-top:22px;color:#8d9298;text-decoration:none;font-size:.88rem}
.back:hover{color:#fff}
</style>
</head>
<body>
<div class="card">
  <div class="brand">Shannons<small>HVAC</small></div>
  <h1>How did we do?</h1>
  <p class="sub">Tap a rating — it only takes a second.</p>
  <div class="stars" id="stars">
    <span class="star" onclick="rate(1)">★</span><span class="star" onclick="rate(2)">★</span><span class="star" onclick="rate(3)">★</span><span class="star" onclick="rate(4)">★</span><span class="star" onclick="rate(5)">★</span>
  </div>
  <p id="msg"></p>
  <a id="link" class="cta" href="#">Continue</a>
  <br>
  <a href="index.html" class="back">← Back to site</a>
</div>
<script>
function rate(n){
  document.querySelectorAll('.star').forEach(function(s,i){s.classList.toggle('active',i<n)});
  var link=document.getElementById('link'),msg=document.getElementById('msg');
  if(n>=4){
    msg.textContent='Thanks! Would you mind sharing that on Google?';
    link.textContent='Leave a Google review';
    link.href='https://search.google.com/local/writereview?placeid=PLACEHOLDER';
    link.target='_blank';
  }else{
    msg.textContent='Sorry we missed the mark — tell us what went wrong.';
    link.textContent='Share private feedback';
    link.href='private.html?rating='+n;
    link.target='';
  }
  link.style.display='inline-block';
}
</script>
</body>
</html>
