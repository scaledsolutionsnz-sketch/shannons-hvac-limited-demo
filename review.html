<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Leave a Review</title><style>body{font-family:'Poppins',sans-serif;background:#f5f5f5;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}.container{background:white;padding:2rem;border-radius:8px;text-align:center;max-width:400px;border-left:4px solid #f97316}h1{color:#333;margin-bottom:2rem}
.stars{font-size:3rem;margin:2rem 0}.star{cursor:pointer;margin:0.5rem;transition:color 0.3s;color:#ddd}.star.active{color:#f97316}a{display:inline-block;margin-top:1rem;padding:0.8rem 2rem;background:#f97316;color:white;text-decoration:none;border-radius:4px}</style></head><body><div class="container"><h1>How are we doing?</h1><div class="stars"><span class="star" onclick="rate(1)">★</span> <span class="star" onclick="rate(2)">★</span> <span class="star" onclick="rate(3)">★</span> <span class="star" onclick="rate(4)">★</span> <span class="star" onclick="rate(5)">★</span></div><p id="msg"></p><a id="link" href="#">Continue</a></div><script>function rate(n){document.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('active',i<n));const link=document.getElementById('link'),msg=document.getElementById('msg');msg.textContent=n<=3?'Tell us how we can improve.':'Thank you! Please share on Google.';link.href=n<=3?'private.html?rating='+n:'https://g.page/r/PLACEHOLDER';link.target=n<=3?'':'_blank'}</script></body></html>
