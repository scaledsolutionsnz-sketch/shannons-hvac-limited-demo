<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Private Feedback</title><style>body{font-family:'Poppins',sans-serif;background:#f5f5f5;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{background:white;padding:2rem;border-radius:8px;max-width:500px;border-left:4px solid #f97316}h1{color:#333;margin-bottom:1.5rem}form{display:flex;flex-direction:column}
