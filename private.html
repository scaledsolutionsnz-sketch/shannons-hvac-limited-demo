<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Feedback | Shannons HVAC Limited</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%2316181b'/%3E%3Ctext x='50' y='68' font-family='Arial Black,Arial' font-size='52' font-weight='900' fill='%23FF5A1F' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700;800&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Public Sans',sans-serif;background:#16181b;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#1e2125;border:1px solid rgba(255,255,255,.09);border-radius:14px;max-width:500px;width:100%;padding:44px 38px}
.brand{font-family:'Saira Condensed';font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:1.3rem;margin-bottom:14px}
.brand small{color:#FF5A1F}
h1{font-family:'Saira Condensed';text-transform:uppercase;font-weight:700;font-size:1.9rem;margin-bottom:6px}
p.sub{color:#aeb3b8;font-size:.95rem;margin-bottom:22px}
label{display:block;font-weight:600;font-size:.84rem;margin-bottom:.35rem}
input,textarea{width:100%;padding:.8rem .9rem;border:1px solid rgba(255,255,255,.14);border-radius:6px;background:#16181b;color:#fff;font:inherit;font-size:.95rem;margin-bottom:14px}
input:focus,textarea:focus{outline:none;border-color:#FF5A1F}
button{width:100%;padding:.9rem;background:#FF5A1F;color:#fff;border:0;border-radius:6px;font-weight:700;font-size:.98rem;cursor:pointer}
button:hover{background:#E8410B}
.back{display:inline-block;margin-top:18px;color:#8d9298;text-decoration:none;font-size:.88rem}
.back:hover{color:#fff}
</style>
</head>
<body>
<div class="card">
  <div class="brand">Shannons<small>HVAC</small></div>
  <h1>Tell us what happened</h1>
  <p class="sub">Your feedback comes straight to Shannon — we'll make it right.</p>
  <form action="https://formsubmit.co/hello@shannonshvac.co.nz" method="POST">
    <label for="name">Name</label>
    <input id="name" type="text" name="name" required>
    <label for="email">Email or phone</label>
    <input id="email" type="text" name="email" required>
    <label for="message">What could we have done better?</label>
    <textarea id="message" name="message" rows="5" required></textarea>
    <input type="hidden" name="_subject" value="Private feedback — Shannons HVAC website">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_captcha" value="false">
    <button type="submit">Send feedback</button>
  </form>
  <a href="index.html" class="back">← Back to site</a>
</div>
</body>
</html>
